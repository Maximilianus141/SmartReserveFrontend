<header class="app-header">
	<!-- TRANSPARENT & BLURRY NAVBAR -->
	<nav class="nav-bar">
		<div class="nav-container">
			<!-- Left: Branding / Title / Links -->
			<div class="brand-group">
				<div class="brand" routerLink="/">
					<span class="brand-name">SmartReserve</span>
				</div>
				<a class="nav-link" routerLink="/reservations" routerLinkActive="active"
					>Your Reservations</a
				>
				@if (keycloakService.hasRole('ROLE_admin')) {
					<div class="admin-actions">
						<a class="nav-link" routerLink="/service/new" routerLinkActive="active">
							Add New Service
						</a>
					</div>
				}
			</div>

			<!-- Right: Decorative Quick Links / Status -->
			<div class="nav-actions">
				<span class="status-badge">
					<span class="status-dot animate-pulse"></span>
					Booking Active
				</span>

				@if (keycloakService.isLoggedIn) {
					<span class="username-badge"> Hello, {{ keycloakService.username }}! </span>
					<button (click)="logout()" class="btn btn-logout">Logout</button>
				} @else {
					<button (click)="login()" class="btn btn-login">Login</button>
				}
			</div>
		</div>
	</nav>

	<!-- Spacer below fixed navbar -->
	<div class="nav-spacer"></div>
</header>
