<header class="text-center">
	<!-- TRANSPARENT & BLURRY NAVBAR -->
	<nav
		class="fixed top-0 left-0 right-0 z-50 bg-white/60 backdrop-blur-md border-b border-white/20 shadow-sm"
	>
		<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 h-16 flex items-center justify-between">
			<!-- Left: Branding / Title -->
			<div class="flex flex-col cursor-pointer" routerLink="/">
				<span class="text-lg font-bold tracking-tight text-slate-950 sm:text-xl">SmartReserve</span>
			</div>

			<!-- Right: Decorative Quick Links / Status (Optional helper icons) -->
			<div class="flex items-center space-x-4 text-sm font-medium text-slate-600">
				<span
					class="flex items-center gap-1.5 bg-indigo-50/80 text-indigo-700 px-3 py-1 rounded-full text-xs font-semibold backdrop-blur-sm"
				>
					<span class="w-1.5 h-1.5 bg-indigo-600 rounded-full animate-pulse"></span>
					Booking Active
				</span>
			</div>
		</div>
	</nav>

	<!-- IMPORTANT: Add this spacer right below the nav so your main content doesn't get hidden underneath the fixed navbar -->
	<div class="h-16"></div>
</header>
