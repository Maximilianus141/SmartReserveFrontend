<div class="booking-card animate-fade-in">
	<div class="booking-header">
		<div>
			<h2 class="step-title">Step 1</h2>
			<p class="section-title">Select Date & Time</p>
		</div>

		@if (service(); as srv) {
			<div class="selected-service-info">
				<span class="service-label">Booking</span>
				<h3 class="service-name">{{ srv.name }}</h3>
				<p class="service-duration">{{ srv.durationSeconds / 60 }} Mins</p>
			</div>
		}
	</div>

	<div class="booking-grid">
		<!-- Calendar takes 3 columns on medium screens -->
		<div class="calender-column">
			<app-booking-select-calender
				(outputDate)="dateSelected($event)"
			></app-booking-select-calender>
		</div>

		<!-- Time slots take 2 columns on medium screens -->
		<div class="slots-column">
			<span class="column-title">Available Slots</span>

			<app-booking-select-time
				class="slots-grid"
				[availability]="availabilityForSelectedDate()"
				(timeSelected)="onTimeConfirmed($event)"
			>
			</app-booking-select-time>

			<div class="selection-footer">
				<p class="selection-summary">
					Selected:
					<span class="summary-highlight">
						@if (selectedTime()) {
							{{ selectedTime() | date: 'MMM dd @ HH:mm' }}
						} @else {
							None
						}
					</span>
				</p>

				@if (selectedTime()) {
					<button class="btn btn-primary btn-confirm animate-fade-in" (click)="confirmBooking()">
						Confirm Booking
					</button>
				}
			</div>
		</div>
	</div>
</div>
