<div class="service-list-container">
	<div class="list-header">
		<h2 class="sub-title">Our Offerings</h2>
		<p class="main-title">Select a Service Below</p>
	</div>

	<div class="services-grid">
		@for (service of serviceList(); track $index) {
			<app-service [service]="service" (serviceId)="handleServiceId($event)"></app-service>
		}
	</div>
</div>
